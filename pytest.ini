[pytest]
asyncio_mode = strict

# The three test files below come from the action-runner template and instantiate
# starlette's TestClient at module load time. With gundi-client-v2 3.x pulling in
# httpx>=0.28 (which removed the `app` kwarg), starlette 0.27.0's TestClient.__init__
# blows up during collection. Skip these until the template is updated to a newer
# fastapi/starlette pair (or refactored to lazy-init the TestClient inside fixtures).
addopts =
    --ignore=app/services/tests/test_action_runner.py
    --ignore=app/services/tests/test_config_events_consumer.py
    --ignore=app/services/tests/test_self_registration.py
